<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | TEAMSYNC</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: var(--bg-main);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 1.5rem;
        }

        .login-container {
            width: 100%;
            max-width: 440px;
            padding: 3rem;
            background: white;
            border-radius: 2rem;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.05);
            animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .logo-box {
            width: 60px;
            height: 60px;
            background: var(--primary);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.75rem;
            margin: 0 auto 1.5rem;
            box-shadow: 0 10px 20px rgba(24, 24, 27, 0.12);
        }

        h1 {
            font-size: 1.85rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 0.5rem;
            color: var(--text-main);
            letter-spacing: -0.5px;
        }

        .subtitle {
            text-align: center;
            color: var(--text-dim);
            margin-bottom: 2.5rem;
            font-size: 0.95rem;
        }

        .form-group input,
        .form-group select {
            background: #f1f5f9;
            border: 1.5px solid transparent;
        }

        .form-group input:focus,
        .form-group select:focus {
            background: white;
            border-color: var(--primary);
        }

        .btn-primary {
            height: 54px;
            font-size: 1rem;
            margin-top: 2rem;
        }

        .demo-badge {
            display: inline-block;
            padding: 0.4rem 0.8rem;
            background: var(--accent-light);
            color: var(--primary);
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 700;
            margin-top: 2rem;
            text-align: center;
            width: 100%;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 2rem 1.5rem;
                border-radius: 1.5rem;
            }

            h1 {
                font-size: 1.5rem;
            }

            .subtitle {
                margin-bottom: 2rem;
            }
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="logo-box">
            <i class="fas fa-leaf"></i>
        </div>
        <h1>TEAMSYNC</h1>
        <p class="subtitle">Efficient Team Collaboration Platform</p>

        <div id="loginSection">
            <form id="loginForm">
                <div class="form-group">
                    <label>Username or Email</label>
                    <input type="text" id="username" placeholder="Enter username or email" required value="admin">
                </div>

                <div class="form-group" style="margin-bottom: 0.5rem;">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required value="admin123">
                </div>
                
                <p style="text-align: right; margin-bottom: 1.5rem; font-size: 0.85rem;">
                    <a href="#" id="showForgotPassword" style="color: var(--text-dim); text-decoration: none; font-weight: 600;">Forgot Password?</a>
                </p>

                <div id="errorMsg" class="error-msg"
                    style="text-align: center; margin-bottom: 1rem; color: #ef4444; font-weight: 600; display: none;"></div>

                <button type="submit" class="btn btn-primary" style="width: 100%;">
                    Get Started <i class="fas fa-arrow-right" style="margin-left: 0.5rem;"></i>
                </button>
            </form>

            <div class="demo-badge">
                <i class="fas fa-info-circle"></i> DEMO: Username <b>admin</b> | Password <b>admin123</b>
            </div>
            
            <p style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem;">
                <a href="#" id="showRegister" style="color: var(--primary); font-weight: 600; text-decoration: none;">New member? Register here</a>
            </p>
        </div>

        <div id="registerSection" style="display: none;">
            <form id="registerForm">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="regName" placeholder="e.g. Jane Doe" required>
                </div>
                <div class="form-group">
                    <label>Professional Email</label>
                    <input type="email" id="regEmail" placeholder="name@company.com" required>
                </div>
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="regUsername" placeholder="e.g. janedoe" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="regPassword" placeholder="Create a password" required>
                    <div id="strengthContainer" style="margin-top: 0.5rem; display: none;">
                        <div style="display: flex; gap: 4px; height: 6px; margin-bottom: 0.3rem;">
                            <div id="bar1" style="flex: 1; background: #e2e8f0; border-radius: 2px; transition: background 0.3s;"></div>
                            <div id="bar2" style="flex: 1; background: #e2e8f0; border-radius: 2px; transition: background 0.3s;"></div>
                            <div id="bar3" style="flex: 1; background: #e2e8f0; border-radius: 2px; transition: background 0.3s;"></div>
                            <div id="bar4" style="flex: 1; background: #e2e8f0; border-radius: 2px; transition: background 0.3s;"></div>
                        </div>
                        <span id="strengthText" style="font-size: 0.75rem; font-weight: 700; color: var(--text-dim);">Password strength</span>
                    </div>
                </div>
                <div class="form-group">
                    <label>System Role</label>
                    <select id="regRole">
                        <option value="member">Team Member</option>
                        <option value="admin">Administrator / Lead</option>
                    </select>
                </div>
                <div id="regErrorMsg" class="error-msg" style="text-align: center; margin-bottom: 1rem; color: #ef4444; font-weight: 600; display: none;"></div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">
                    Create Account <i class="fas fa-user-plus" style="margin-left: 0.5rem;"></i>
                </button>
            </form>
            <p style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem;">
                <a href="#" id="showLogin" style="color: var(--primary); font-weight: 600; text-decoration: none;">Already have an account? Sign In</a>
            </p>
        </div>

        <div id="forgotPasswordSection" style="display: none;">
            <form id="forgotPasswordForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="resetEmail" placeholder="Enter your registered email" required>
                </div>
                <div id="resetSuccessMsg" class="success-msg" style="text-align: center; margin-bottom: 1rem; color: var(--primary); font-weight: 600; display: none;"></div>
                <div id="resetErrorMsg" class="error-msg" style="text-align: center; margin-bottom: 1rem; color: #ef4444; font-weight: 600; display: none;"></div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">
                    Send Reset Link <i class="fas fa-paper-plane" style="margin-left: 0.5rem;"></i>
                </button>
            </form>
            <p style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem;">
                <a href="#" id="hideForgotPassword" style="color: var(--primary); font-weight: 600; text-decoration: none;">Back to Sign In</a>
            </p>
        </div>
    </div>

    <script type="module">
        import { getAllUsers, createUser, setCurrentUser, getCurrentUser, loginUser, registerUser, sendPasswordReset } from './js/data.js';

        // Login Submit
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const usernameInput = document.getElementById('username').value.trim();
            const passwordInput = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            const submitBtn = e.target.querySelector('button[type="submit"]');

            try {
                submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in...';
                submitBtn.disabled = true;
                errorMsg.style.display = 'none';

                // Seed default users if the admin user is not found, so the demo credentials work!
                const users = await getAllUsers();
                if (!users.find(u => u.username?.toLowerCase() === 'admin')) {
                    console.log("Seeding initial database users...");
                    const initialUsers = [
                        {
                            id: 'TM-001',
                            name: 'Admin User',
                            role: 'admin',
                            email: 'admin@team.com',
                            username: 'admin',
                            password: 'admin123',
                            streak: 0,
                            longestStreak: 0,
                            avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=Admin'
                        },
                        {
                            id: 'TM-002',
                            name: 'Karth fire',
                            role: 'member',
                            email: 'karthfire@gmail.com',
                            username: 'karthfire',
                            password: 'karth123',
                            streak: 0,
                            longestStreak: 0,
                            avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=KarthFire'
                        },
                        {
                            id: 'TM-003',
                            name: 'Karthick',
                            role: 'member',
                            email: 'karthick123@gmail.com',
                            username: 'karthick',
                            password: 'karthick123',
                            streak: 0,
                            longestStreak: 0,
                            avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=Karthick'
                        },
                        {
                            id: 'TM-004',
                            name: 'Akash',
                            role: 'member',
                            email: 'akash@gmail.com',
                            username: 'akash',
                            password: 'akash123',
                            streak: 0,
                            longestStreak: 0,
                            avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=Akash'
                        }
                    ];

                    for (const u of initialUsers) {
                        await createUser(u);
                    }
                }

                await loginUser(usernameInput, passwordInput);
                window.location.href = 'dashboard.html';
            } catch (err) {
                console.error(err);
                submitBtn.innerHTML = 'Get Started <i class="fas fa-arrow-right" style="margin-left: 0.5rem;"></i>';
                submitBtn.disabled = false;
                errorMsg.style.display = 'block';
                
                // User-friendly error mapping
                if (err.code === 'auth/invalid-credential' || err.code === 'auth/user-not-found' || err.code === 'auth/wrong-password') {
                    errorMsg.innerText = "Invalid username/email or password.";
                } else if (err.code === 'auth/too-many-requests') {
                    errorMsg.innerText = "Too many login attempts. Please reset your password or try again later.";
                } else {
                    errorMsg.innerHTML = `<strong>Error:</strong> ${err.message || 'Unknown authentication issue.'}`;
                }
            }
        });

        // Register Submit
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const username = document.getElementById('regUsername').value.trim().toLowerCase();
            const password = document.getElementById('regPassword').value;
            const role = document.getElementById('regRole').value;
            const errorMsg = document.getElementById('regErrorMsg');
            const submitBtn = e.target.querySelector('button[type="submit"]');

            // Strong password enforcement
            if (password.length < 8) {
                errorMsg.style.display = 'block';
                errorMsg.innerText = "Password must be at least 8 characters long.";
                return;
            }
            if (!/[A-Z]/.test(password) || !/[a-z]/.test(password) || !/[0-9]/.test(password)) {
                errorMsg.style.display = 'block';
                errorMsg.innerText = "Password must contain uppercase, lowercase letters, and at least one number.";
                return;
            }

            try {
                submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating Account...';
                submitBtn.disabled = true;
                errorMsg.style.display = 'none';

                await registerUser(name, email, username, password, role);
                window.location.href = 'dashboard.html';
            } catch (err) {
                console.error(err);
                submitBtn.innerHTML = 'Create Account <i class="fas fa-user-plus" style="margin-left: 0.5rem;"></i>';
                submitBtn.disabled = false;
                errorMsg.style.display = 'block';
                if (err.code === 'auth/email-already-in-use') {
                    errorMsg.innerText = "This email is already in use by another account.";
                } else if (err.code === 'auth/weak-password') {
                    errorMsg.innerText = "The password is too weak.";
                } else if (err.code === 'auth/invalid-email') {
                    errorMsg.innerText = "The email address is invalid.";
                } else {
                    errorMsg.innerText = err.message || "Failed to create account.";
                }
            }
        });

        // Forgot Password Submit
        document.getElementById('forgotPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const resetEmail = document.getElementById('resetEmail').value.trim();
            const successMsg = document.getElementById('resetSuccessMsg');
            const errorMsg = document.getElementById('resetErrorMsg');
            const submitBtn = e.target.querySelector('button[type="submit"]');

            try {
                submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending...';
                submitBtn.disabled = true;
                successMsg.style.display = 'none';
                errorMsg.style.display = 'none';

                await sendPasswordReset(resetEmail);
                
                successMsg.style.display = 'block';
                successMsg.innerText = "Password reset email sent! Please check your inbox.";
                document.getElementById('resetEmail').value = '';
            } catch (err) {
                console.error(err);
                errorMsg.style.display = 'block';
                if (err.code === 'auth/user-not-found') {
                    errorMsg.innerText = "No account found with this email address.";
                } else if (err.code === 'auth/invalid-email') {
                    errorMsg.innerText = "Please enter a valid email address.";
                } else {
                    errorMsg.innerText = err.message || "Failed to send reset email.";
                }
            } finally {
                submitBtn.innerHTML = 'Send Reset Link <i class="fas fa-paper-plane" style="margin-left: 0.5rem;"></i>';
                submitBtn.disabled = false;
            }
        });

        // Navigation toggles
        document.getElementById('showRegister').addEventListener('click', (e) => {
            e.preventDefault();
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('registerSection').style.display = 'block';
            document.getElementById('errorMsg').style.display = 'none';
        });

        document.getElementById('showLogin').addEventListener('click', (e) => {
            e.preventDefault();
            document.getElementById('registerSection').style.display = 'none';
            document.getElementById('loginSection').style.display = 'block';
            document.getElementById('regErrorMsg').style.display = 'none';
        });

        document.getElementById('showForgotPassword').addEventListener('click', (e) => {
            e.preventDefault();
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('forgotPasswordSection').style.display = 'block';
            document.getElementById('errorMsg').style.display = 'none';
        });

        document.getElementById('hideForgotPassword').addEventListener('click', (e) => {
            e.preventDefault();
            document.getElementById('forgotPasswordSection').style.display = 'none';
            document.getElementById('loginSection').style.display = 'block';
            document.getElementById('resetSuccessMsg').style.display = 'none';
            document.getElementById('resetErrorMsg').style.display = 'none';
        });

        // Interactive Password Strength Meter
        const regPasswordInput = document.getElementById('regPassword');
        const strengthContainer = document.getElementById('strengthContainer');
        const strengthText = document.getElementById('strengthText');
        const bars = [
            document.getElementById('bar1'),
            document.getElementById('bar2'),
            document.getElementById('bar3'),
            document.getElementById('bar4')
        ];

        regPasswordInput.addEventListener('input', () => {
            const val = regPasswordInput.value;
            if (val === '') {
                strengthContainer.style.display = 'none';
                return;
            }
            strengthContainer.style.display = 'block';

            let score = 0;
            if (val.length >= 8) score++;
            if (/[A-Z]/.test(val) && /[a-z]/.test(val)) score++;
            if (/[0-9]/.test(val)) score++;
            if (/[^A-Za-z0-9]/.test(val)) score++;

            bars.forEach((bar, idx) => {
                if (idx < score) {
                    if (score === 1) {
                        bar.style.background = '#ef4444'; // Red
                    } else if (score === 2) {
                        bar.style.background = '#f59e0b'; // Orange
                    } else if (score === 3) {
                        bar.style.background = '#3b82f6'; // Blue
                    } else {
                        bar.style.background = '#10b981'; // Green
                    }
                } else {
                    bar.style.background = '#e2e8f0'; // Gray
                }
            });

            const labels = ["Too Weak", "Weak", "Medium", "Strong"];
            strengthText.innerText = `Strength: ${labels[score - 1] || 'Too Weak'}`;
            if (score === 4) {
                strengthText.style.color = '#10b981';
            } else if (score === 3) {
                strengthText.style.color = '#3b82f6';
            } else if (score === 2) {
                strengthText.style.color = '#f59e0b';
            } else {
                strengthText.style.color = '#ef4444';
            }
        });

        // Redirect if already logged in
        if (getCurrentUser()) {
            window.location.href = 'dashboard.html';
        }
    </script>
</body>

</html>
