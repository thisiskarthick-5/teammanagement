<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance | TEAMSYNC</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 0.75rem;
            margin-top: 1.5rem;
        }

        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            font-size: 0.95rem;
            font-weight: 700;
            position: relative;
            color: #64748b;
            transition: all 0.2s;
        }

        .calendar-day.present {
            background: #ecfdf5;
            color: #059669;
            border-color: #34d399;
        }

        .calendar-day.present::after {
            content: '';
            position: absolute;
            bottom: 6px;
            width: 4px;
            height: 4px;
            background: #059669;
            border-radius: 50%;
        }

        .calendar-header {
            text-align: center;
            font-weight: 800;
            color: var(--text-dim);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            padding-bottom: 0.75rem;
        }

        .streak-card {
            background: white;
            border-radius: var(--radius-lg);
            padding: 2.5rem;
            text-align: center;
            border: 1px solid #e2e8f0;
            box-shadow: var(--shadow-sm);
        }
    </style>
    </style>
</head>

<body>
    <main class="main-content">
        <header class="responsive-flex" style="margin-bottom: 2.5rem;">
            <div>
                <h1>Daily Attendance</h1>
                <p class="text-dim">Stay consistent to maintain your streak.</p>
            </div>
            <button class="btn btn-primary" id="attendanceBtn" onclick="handleMarkAttendance()">
                <i class="fas fa-fingerprint"></i> Mark Attendance
            </button>
        </header>

        <div class="responsive-grid" style="grid-template-columns: 1fr 2fr; gap: 2rem;">
            <div class="streak-card">
                <div
                    style="width: 80px; height: 80px; background: #fffbeb; border-radius: 24px; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem;">
                    <i class="fas fa-fire" style="color: #f59e0b; font-size: 2.5rem;"></i>
                </div>
                <h2 id="streakCount" style="font-size: 2.5rem; margin: 0; color: var(--text-main);">0 Days</h2>
                <div
                    style="font-weight: 700; color: #f59e0b; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 0.05em; margin-top: 0.5rem;">
                    Current Achievement</div>

                <div
                    style="margin-top: 2.5rem; padding-top: 2rem; border-top: 1px solid #f1f5f9; display: flex; flex-direction: column; gap: 1rem;">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <span style="font-weight: 600; color: var(--text-dim); font-size: 0.9rem;">Record Streak</span>
                        <span id="longestStreak" style="font-weight: 800; color: var(--text-main);">0 Days</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <span style="font-weight: 600; color: var(--text-dim); font-size: 0.9rem;">Last Checked
                            In</span>
                        <span id="lastActive" style="font-weight: 800; color: var(--text-main);">Never</span>
                    </div>
                </div>
            </div>

            <div class="glass" style="padding: 2.5rem; overflow-x: auto;">
                <div class="responsive-flex" style="margin-bottom: 2rem;">
                    <h2 style="margin: 0; font-size: 1.5rem;">February 2026</h2>
                    <div style="display: flex; gap: 0.5rem;">
                        <button class="btn" style="padding: 0.5rem; border-radius: 8px; background: #f1f5f9;"><i
                                class="fas fa-chevron-left"></i></button>
                        <button class="btn" style="padding: 0.5rem; border-radius: 8px; background: #f1f5f9;"><i
                                class="fas fa-chevron-right"></i></button>
                    </div>
                </div>
                <div class="calendar-grid">
                    <div class="calendar-header">Sun</div>
                    <div class="calendar-header">Mon</div>
                    <div class="calendar-header">Tue</div>
                    <div class="calendar-header">Wed</div>
                    <div class="calendar-header">Thu</div>
                    <div class="calendar-header">Fri</div>
                    <div class="calendar-header">Sat</div>
                    <!-- Days -->
                    <div class="calendar-day" style="grid-column: 1;">1</div>
                    <div class="calendar-day">2</div>
                    <div class="calendar-day">3</div>
                    <div class="calendar-day" id="day-4">4</div>
                    <div class="calendar-day">5</div>
                    <div class="calendar-day">6</div>
                    <div class="calendar-day">7</div>
                    <div class="calendar-day">8</div>
                    <div class="calendar-day">9</div>
                    <div class="calendar-day">10</div>
                    <div class="calendar-day">11</div>
                    <div class="calendar-day">12</div>
                    <div class="calendar-day">13</div>
                    <div class="calendar-day">14</div>
                </div>
                <div
                    style="margin-top: 2rem; padding: 1rem 1.5rem; background: #f8fafc; border-radius: 12px; border-left: 4px solid var(--primary);">
                    <p style="margin: 0; font-size: 0.85rem; color: #475569; font-weight: 600;">
                        <i class="fas fa-info-circle" style="color: var(--primary); margin-right: 0.5rem;"></i>
                        System consistency requires daily registration of activity.
                    </p>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { getAttendance, markAttendance, getCurrentUser, getUser } from './js/data.js';
        import { initSidebar } from './js/sidebar.js';

        document.addEventListener('DOMContentLoaded', initSidebar);

        const currentUser = getCurrentUser();

        async function updateUI() {
            try {
                // Fetch fresh user data for streaks
                const u = await getUser(currentUser.id);
                if (!u) return;

                document.getElementById('streakCount').innerText = `${u.streak || 0} Days`;
                document.getElementById('longestStreak').innerText = `${u.longestStreak || 0} Days`;
                document.getElementById('lastActive').innerText = u.lastActive || 'Never';

                const records = await getAttendance(u.id);
                records.forEach(r => {
                    const day = r.date.split('-')[2];
                    const dayEl = document.getElementById(`day-${parseInt(day)}`);
                    if (dayEl) dayEl.classList.add('present');
                });

                // If already marked today
                const today = new Date().toISOString().split('T')[0];
                if (records.find(r => r.date === today)) {
                    const btn = document.getElementById('attendanceBtn');
                    btn.disabled = true;
                    btn.innerText = 'Attendance Marked';
                    btn.style.opacity = '0.5';
                }
            } catch (err) {
                console.error("Error updating attendance UI:", err);
            }
        }

        window.handleMarkAttendance = async () => {
            try {
                const success = await markAttendance(currentUser.id);
                if (success) {
                    await updateUI();
                }
            } catch (err) {
                console.error("Error marking attendance:", err);
            }
        };

        updateUI();
    </script>
</body>

</html>
