<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Members | TEAMSYNC</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .member-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 1rem;
        }

        .member-table th {
            text-align: left;
            padding: 1rem 1.5rem;
            color: var(--text-dim);
            font-weight: 700;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .member-table td {
            padding: 1.25rem 1.5rem;
            background: white;
            border-top: 1px solid #e2e8f0;
            border-bottom: 1px solid #e2e8f0;
            transition: background 0.2s;
        }

        .member-table tr:hover td {
            background: #f8fafc;
        }

        .member-table tr td:first-child {
            border-left: 1px solid #e2e8f0;
            border-top-left-radius: 1.25rem;
            border-bottom-left-radius: 1.25rem;
        }

        .member-table tr td:last-child {
            border-right: 1px solid #e2e8f0;
            border-top-right-radius: 1.25rem;
            border-bottom-right-radius: 1.25rem;
        }

        .id-badge {
            background: #f1f5f9;
            color: var(--primary);
            padding: 0.4rem 0.8rem;
            border-radius: 8px;
            font-family: 'JetBrains Mono', 'Monaco', monospace;
            font-weight: 700;
            font-size: 0.85rem;
        }

        @media (max-width: 768px) {
            .member-table th {
                padding: 0.75rem 0.5rem;
                font-size: 0.7rem;
            }
            .member-table td {
                padding: 1rem 0.5rem;
                font-size: 0.85rem;
            }
            .member-table img {
                width: 32px !important;
                height: 32px !important;
            }
            .id-badge {
                padding: 0.2rem 0.4rem;
                font-size: 0.7rem;
            }
            .btn-secondary {
                padding: 0.4rem 0.75rem !important;
                font-size: 0.75rem !important;
            }
        }
    </style>
</head>

<body>
    <main class="main-content">
        <header class="responsive-flex" style="margin-bottom: 2.5rem;">
            <div>
                <h1>Team Management</h1>
                <p class="text-dim">Add and manage your team members and their roles.</p>
            </div>
            <button class="btn btn-primary" onclick="openModal()">
                <i class="fas fa-plus"></i> Add Member
            </button>
        </header>

        <div class="glass" style="padding: 1.5rem; overflow-x: auto;">
            <table class="member-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Member</th>
                        <th>Role</th>
                        <th>Streak</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="memberList">
                    <!-- Loaded dynamically -->
                </tbody>
            </table>
        </div>
    </main>

    <!-- Add Member Modal -->
    <div id="addMemberModal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <div class="responsive-flex" style="margin-bottom: 2rem;">
                <h2 style="margin: 0;">Add New Member</h2>
                <button onclick="closeModal()"
                    style="background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 1.5rem;"><i
                        class="fas fa-times"></i></button>
            </div>
            <form id="addMemberForm">
                <div class="form-group">
                    <label>Personnel Full Name</label>
                    <input type="text" id="newName" placeholder="e.g. Alex Rivera" required>
                </div>
                <div class="form-group">
                    <label>Professional Email</label>
                    <input type="email" id="newEmail" placeholder="alex@teamsync.co" required>
                </div>
                <button type="submit" class="btn btn-primary"
                    style="width: 100%; height: 50px; margin-top: 1rem;">Provision Account</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { getAllUsers, createUser, getCurrentUser } from './js/data.js';
        import { initSidebar } from './js/sidebar.js';

        document.addEventListener('DOMContentLoaded', initSidebar);

        const currentUser = getCurrentUser();

        async function renderMembers() {
            try {
                const allUsers = await getAllUsers();
                const users = allUsers.filter(u => u.teamId === currentUser.teamId);
                const list = document.getElementById('memberList');
                list.innerHTML = users.map(u => `
                    <tr class="animate-in">
                        <td><span class="id-badge">${u.id}</span></td>
                        <td>
                            <div style="display: flex; align-items: center; gap: 1rem;">
                                <img src="${u.avatar}" style="width: 44px; height: 44px; border-radius: 50%; border: 2px solid white; box-shadow: var(--shadow-sm);">
                                <div>
                                    <div style="font-weight: 800; color: var(--text-main); font-size: 1rem;">${u.name}</div>
                                    <div style="font-size: 0.8rem; color: var(--text-dim); font-weight: 500;">${u.email}</div>
                                </div>
                            </div>
                        </td>
                        <td>
                            <span style="padding: 0.4rem 0.85rem; background: #ecfdf5; color: #065f46; border-radius: 100px; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em;">
                                ${u.role}
                            </span>
                        </td>
                        <td>
                            <div style="display: flex; align-items: center; gap: 0.5rem; font-weight: 700; color: #f59e0b;">
                                <i class="fas fa-fire"></i>
                                <span>${u.streak || 0} Days</span>
                            </div>
                        </td>
                        <td>
                            <button class="btn btn-secondary" style="padding: 0.6rem 1.25rem; font-size: 0.8rem; border-radius: 12px;" onclick="window.location.href='profile.html?id=${u.id}'">
                                <i class="fas fa-external-link-alt"></i> Portfolio
                            </button>
                        </td>
                    </tr>
                `).join('');
            } catch (err) {
                console.error("Error rendering members:", err);
            }
        }

        window.openModal = () => { document.getElementById('addMemberModal').style.display = 'flex'; };
        window.closeModal = () => { document.getElementById('addMemberModal').style.display = 'none'; };

        document.getElementById('addMemberForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('newName').value;
            const email = document.getElementById('newEmail').value;

            const newMember = {
                name: name,
                role: 'member',
                email: email,
                streak: 0,
                longestStreak: 0,
                teamId: currentUser.teamId,
                teamName: currentUser.teamName,
                avatar: `https://api.dicebear.com/7.x/avataaars/svg?seed=${name}`
            };

            try {
                await createUser(newMember);
                await renderMembers();
                window.closeModal();
                document.getElementById('addMemberForm').reset();
            } catch (err) {
                console.error("Error creating member:", err);
            }
        });

        if (currentUser && currentUser.role !== 'admin') {
            window.location.href = 'dashboard.html';
        }

        renderMembers();
    </script>
</body>

</html>
