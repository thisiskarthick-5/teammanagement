<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | TEAMSYNC</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .profile-card {
            background: white;
            border-radius: var(--radius-lg);
            border: 1px solid #e2e8f0;
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }

        .profile-header-banner {
            height: 150px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            position: relative;
        }

        .avatar-large {
            width: 140px;
            height: 140px;
            border-radius: 32px;
            border: 6px solid white;
            position: absolute;
            bottom: -70px;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: var(--shadow-lg);
            background: white;
            object-fit: cover;
        }

        .avatar-edit-overlay {
            width: 140px;
            height: 140px;
            border-radius: 32px;
            position: absolute;
            bottom: -70px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.4);
            opacity: 0;
            cursor: pointer;
            transition: opacity 0.2s;
            z-index: 2;
            color: white;
            font-size: 1.4rem;
        }

        .profile-header-banner:hover .avatar-edit-overlay {
            opacity: 1;
        }

        .skill-tag {
            padding: 0.5rem 1.25rem;
            background: #f1f5f9;
            color: #475569;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            border: 1px solid #e2e8f0;
            transition: all 0.2s;
        }

        .skill-tag:hover {
            background: white;
            border-color: var(--primary);
            color: var(--primary);
            transform: translateY(-2px);
        }

        .achievement-card {
            padding: 1.5rem;
            background: #f8fafc;
            border-radius: 1.25rem;
            border: 1px solid #e2e8f0;
            transition: all 0.2s;
        }

        .achievement-card:hover {
            background: white;
            border-color: var(--primary);
            box-shadow: var(--shadow-md);
        }

        .hover-edit:hover {
            color: var(--primary) !important;
        }

        .section-empty-state {
            text-align: center;
            padding: 2rem 1rem;
            background: #f8fafc;
            border-radius: 1rem;
            border: 2px dashed #e2e8f0;
        }

        .section-empty-state i {
            font-size: 2rem;
            color: #cbd5e1;
            margin-bottom: 0.5rem;
        }

        .section-empty-state p {
            margin: 0;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-dim);
        }

        /* --- Modal: Avatar Preview --- */
        .modal-avatar-preview {
            width: 80px;
            height: 80px;
            border-radius: 16px;
            object-fit: cover;
            border: 3px solid #e2e8f0;
            background: #f1f5f9;
        }

        @media (max-width: 768px) {
            .profile-header-banner {
                height: 100px;
            }
            .avatar-large, .avatar-edit-overlay {
                width: 100px;
                height: 100px;
                bottom: -50px;
                border-radius: 20px;
            }
            .profile-card div[style*="padding: 5rem"] {
                padding: 4rem 1.5rem 1.5rem !important;
            }
            .profile-card h1 {
                font-size: 1.75rem !important;
            }
            .profile-card div[style*="gap: 3rem"] {
                gap: 1.5rem !important;
            }
            .achievement-card {
                padding: 1rem;
            }
        }
    </style>
</head>

<body>
    <main class="main-content">
        <div id="profileContainer">
            <!-- Loaded dynamically -->
        </div>
    </main>

    <script type="module">
        import { getUser, getTasks, getAttendance, getCurrentUser, updateUser, sendPasswordReset } from './js/data.js';
        import { initSidebar } from './js/sidebar.js';

        document.addEventListener('DOMContentLoaded', initSidebar);

        const urlParams = new URLSearchParams(window.location.search);
        const profileId = urlParams.get('id');
        const currentUser = getCurrentUser();

        async function renderProfile() {
            try {
                const user = await getUser(profileId);
                const container = document.getElementById('profileContainer');

                if (!user) {
                    container.innerHTML = `<div class="glass" style="padding: 4rem; text-align: center;">Member not found.</div>`;
                    return;
                }

                const allTasks = await getTasks();
                const tasks = allTasks.filter(t => t.assignedTo === user.id && t.status === 'Approved');
                const attendance = await getAttendance(user.id);

                const isOwner = currentUser && currentUser.id === user.id;

                // Skills section content
                const skillsContent = user.skills
                    ? user.skills.split(',').map(s => `
                        <span class="skill-tag">
                            <i class="fas fa-check-circle" style="color: var(--primary); font-size: 0.8rem;"></i>
                            ${s.trim()}
                        </span>
                    `).join('')
                    : `<div class="section-empty-state">
                        <i class="fas fa-lightbulb"></i>
                        <p>${isOwner ? 'Add your skills by clicking Edit!' : 'No skills listed yet.'}</p>
                    </div>`;

                // Digital footprint content
                const hasSocialLinks = user.github || user.linkedin;
                const digitalContent = `
                    ${user.github ? `
                        <a href="${user.github}" target="_blank" class="btn" style="background: #f1f5f9; justify-content: flex-start; gap: 1rem; padding: 1rem 1.25rem; font-weight: 700; border-radius: 14px;">
                            <i class="fab fa-github" style="font-size: 1.25rem;"></i> GitHub Repository
                        </a>` : (isOwner ? '' : '')}
                    ${user.linkedin ? `
                        <a href="${user.linkedin}" target="_blank" class="btn" style="background: #f1f5f9; justify-content: flex-start; gap: 1rem; padding: 1rem 1.25rem; font-weight: 700; border-radius: 14px;">
                            <i class="fab fa-linkedin" style="font-size: 1.25rem; color: #0077b5;"></i> Professional Network
                        </a>` : ''}
                    <a href="mailto:${user.email}" class="btn" style="background: #f1f5f9; justify-content: flex-start; gap: 1rem; padding: 1rem 1.25rem; font-weight: 700; border-radius: 14px;">
                        <i class="fas fa-envelope" style="font-size: 1.25rem; color: #ea4335;"></i> ${user.email}
                    </a>
                    ${!hasSocialLinks && isOwner ? `<div class="section-empty-state"><i class="fas fa-link"></i><p>Add your GitHub & LinkedIn by clicking Edit!</p></div>` : ''}
                `;

                // Study Notes content
                const studyNotes = user.studyNotes || [];
                const studyNotesContent = studyNotes.length === 0
                    ? `<div class="section-empty-state" style="padding: 4rem 2rem;">
                        <i class="fas fa-book-open" style="font-size: 2.5rem; color: #cbd5e1;"></i>
                        <p style="margin-top: 0.75rem;">${isOwner ? 'No study notes shared yet. Click share notes to begin!' : 'No study notes shared yet.'}</p>
                    </div>`
                    : studyNotes.map((note, index) => `
                        <div class="achievement-card" style="display: flex; flex-direction: column; gap: 0.5rem; position: relative; text-align: left;">
                            ${isOwner ? `
                                <button onclick="window.deleteStudyNote(${index})" style="position: absolute; top: 1.25rem; right: 1.25rem; background: none; border: none; color: #ef4444; cursor: pointer; transition: transform 0.2s;" title="Delete Note">
                                    <i class="fas fa-trash-alt"></i>
                                </button>
                            ` : ''}
                            <div style="display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap;">
                                <span style="font-size: 0.7rem; font-weight: 800; color: #065f46; background: #d1fae5; padding: 0.25rem 0.6rem; border-radius: 100px; text-transform: uppercase;">
                                    ${note.category || 'GENERAL'}
                                </span>
                                <span style="font-family: monospace; font-size: 0.8rem; font-weight: 700; color: #1e3a8a; background: #dbeafe; padding: 0.25rem 0.6rem; border-radius: 8px;">
                                    ${note.subjectCode || 'CODE'}
                                </span>
                                <span style="font-size: 0.85rem; color: var(--text-dim); font-weight: 700;">
                                    ${note.subject || 'Subject'}
                                </span>
                            </div>
                            <h4 style="margin: 0; font-size: 1.15rem; color: var(--text-main); font-weight: 800; margin-top: 0.25rem;">
                                ${note.title}
                            </h4>
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 0.5rem;">
                                <span style="font-size: 0.8rem; color: var(--text-dim); font-weight: 500;">
                                    Shared on ${new Date(note.date || Date.now()).toLocaleDateString()}
                                </span>
                                <a href="${note.link}" target="_blank" style="color: var(--primary); font-weight: 800; font-size: 0.85rem; text-decoration: none; display: flex; align-items: center; gap: 0.4rem;">
                                    Access Study Material <i class="fas fa-external-link-alt" style="font-size: 0.75rem;"></i>
                                </a>
                            </div>
                        </div>
                    `).join('');

                // Contributions content
                const allContributions = [
                    ...tasks.map(t => ({ ...t, _type: 'verified' })),
                    ...(user.customContributions || []).map(c => ({ ...c, _type: 'custom' }))
                ];

                const contributionsContent = allContributions.length === 0
                    ? `<div class="section-empty-state" style="padding: 4rem 2rem;">
                        <i class="fas fa-scroll" style="font-size: 2.5rem;"></i>
                        <p style="margin-top: 0.75rem;">${isOwner ? 'No contributions yet. Add a custom one or get tasks approved!' : 'No contributions yet.'}</p>
                    </div>`
                    : allContributions.map(item => item._type === 'verified'
                        ? `<div class="achievement-card">
                            <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 0.75rem;">
                                <h4 style="margin: 0; font-size: 1.1rem; color: var(--text-main);">${item.title}</h4>
                                <span style="font-size: 0.7rem; font-weight: 800; color: var(--primary-light); background: var(--accent-light); padding: 0.35rem 0.75rem; border-radius: 100px; text-transform: uppercase;">VERIFIED</span>
                            </div>
                            <div style="display: flex; justify-content: space-between; align-items: center;">
                                <span style="font-size: 0.85rem; color: var(--text-dim); font-weight: 600;">Finalized on ${new Date(item.createdAt).toLocaleDateString()}</span>
                                ${item.submission && item.submission.link ? `<a href="${item.submission.link}" target="_blank" style="color: var(--primary); font-weight: 800; font-size: 0.85rem; text-decoration: none; display: flex; align-items: center; gap: 0.5rem;">
                                    Source Artifact <i class="fas fa-arrow-right" style="font-size: 0.7rem;"></i>
                                </a>` : ''}
                            </div>
                        </div>`
                        : `<div class="achievement-card">
                            <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 0.75rem;">
                                <h4 style="margin: 0; font-size: 1.1rem; color: var(--text-main);">${item.title}</h4>
                                <span style="font-size: 0.7rem; font-weight: 800; color: #475569; background: #e2e8f0; padding: 0.35rem 0.75rem; border-radius: 100px; text-transform: uppercase;">CUSTOM</span>
                            </div>
                            <div style="display: flex; justify-content: space-between; align-items: center;">
                                <span style="font-size: 0.85rem; color: var(--text-dim); font-weight: 600;">Added on ${new Date(item.date || Date.now()).toLocaleDateString()}</span>
                                ${item.link ? `<a href="${item.link}" target="_blank" style="color: var(--primary); font-weight: 800; font-size: 0.85rem; text-decoration: none; display: flex; align-items: center; gap: 0.5rem;">
                                    Link <i class="fas fa-arrow-right" style="font-size: 0.7rem;"></i>
                                </a>` : ''}
                            </div>
                        </div>`
                    ).join('');

                container.innerHTML = `
                    <div class="profile-card animate-in" style="margin-bottom: 2rem;">
                        <div class="profile-header-banner">
                            ${isOwner ? `<div class="avatar-edit-overlay" onclick="window.openEditModal('group-avatar')"><i class="fas fa-camera"></i></div>` : ''}
                            ${isOwner ? `
                                <button onclick="window.openEditModal('group-bio')" class="btn btn-primary" style="position: absolute; top: 1.5rem; right: 1.5rem; padding: 0.75rem 1.5rem; color: #064e3b;">
                                    <i class="fas fa-pen-nib"></i> Edit Portfolio
                                </button>
                            ` : ''}
                            <img src="${user.avatar || 'https://api.dicebear.com/7.x/avataaars/svg?seed=' + encodeURIComponent(user.name)}" class="avatar-large" id="profileAvatar">
                        </div>
                        
                        <div style="padding: 5rem 2.5rem 2.5rem; text-align: center;">
                            <h1 style="font-size: 2.25rem; margin-bottom: 0.25rem;">${user.name}</h1>
                            <div style="display: flex; justify-content: center; align-items: center; gap: 0.75rem; margin-bottom: 1.5rem;">
                                <span style="background: #f1f5f9; color: #475569; padding: 0.4rem 1rem; border-radius: 100px; font-weight: 700; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em;">${user.id}</span>
                                <span style="background: var(--accent-light); color: var(--primary-light); padding: 0.4rem 1rem; border-radius: 100px; font-weight: 700; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em;">${user.role}</span>
                            </div>
                            
                            ${user.bio
                                ? `<p style="max-width: 650px; margin: 0 auto 2rem; color: var(--text-dim); line-height: 1.6; font-size: 1.05rem;">${user.bio}</p>`
                                : (isOwner ? `<p style="max-width: 500px; margin: 0 auto 2rem; color: #94a3b8; font-style: italic; font-size: 0.95rem;">No bio yet — click <strong>Edit Portfolio</strong> to introduce yourself!</p>` : '')}
                            
                            <div style="display: flex; justify-content: center; gap: 3rem; border-top: 1px solid #f1f5f9; padding-top: 2rem;">
                                <div>
                                    <div style="font-size: 2rem; font-weight: 800; color: var(--primary);">${user.streak || 0}</div>
                                    <div style="font-weight: 700; color: var(--text-dim); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em;">Day Streak</div>
                                </div>
                                <div>
                                    <div style="font-size: 2rem; font-weight: 800; color: var(--primary);">${allContributions.length}</div>
                                    <div style="font-weight: 700; color: var(--text-dim); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em;">Milestones</div>
                                </div>
                                <div>
                                    <div style="font-size: 2rem; font-weight: 800; color: var(--primary);">${attendance.length}</div>
                                    <div style="font-weight: 700; color: var(--text-dim); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em;">Engagements</div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="responsive-grid" style="grid-template-columns: 1fr 1.8fr; gap: 2rem;">
                        <!-- Sidebar: Skills + Links -->
                        <div style="display: flex; flex-direction: column; gap: 2rem;">                            ${(isOwner || (currentUser && currentUser.role === 'admin')) ? `
                            <div class="glass" style="padding: 2rem; border-color: var(--primary-light); background: #f0fdf4;">
                                <h3 style="margin-bottom: 1rem; font-size: 1.25rem; color: #166534; display: flex; align-items: center; gap: 0.5rem; font-weight: 800;">
                                    <i class="fas fa-key"></i> System Credentials
                                </h3>
                                <p style="font-size: 0.85rem; margin-bottom: 1.25rem; font-weight: 600; color: #166534; opacity: 0.85; line-height: 1.4;">
                                    Keep these login credentials secure. Use them to sign in to TEAMSYNC.
                                </p>
                                <div style="display: flex; flex-direction: column; gap: 0.75rem;">
                                    <div style="display: flex; justify-content: space-between; align-items: center; background: white; padding: 0.75rem 1rem; border-radius: 10px; border: 1px solid #dcfce7;">
                                        <div style="display: flex; flex-direction: column; gap: 0.15rem; text-align: left;">
                                            <span style="font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; font-weight: 700; display: block;">Username</span>
                                            <span style="font-weight: 700; color: var(--text-main); font-family: monospace; font-size: 0.95rem;">${user.username || 'N/A'}</span>
                                        </div>
                                        <button onclick="navigator.clipboard.writeText('${user.username}')" class="btn" style="padding: 0.4rem; background: #f1f5f9; border-radius: 6px; font-size: 0.8rem; min-width: 32px; height: 32px; border: none; cursor: pointer;" title="Copy Username">
                                            <i class="far fa-copy"></i>
                                        </button>
                                    </div>
                                    ${user.password ? `
                                    <div style="display: flex; justify-content: space-between; align-items: center; background: white; padding: 0.75rem 1rem; border-radius: 10px; border: 1px solid #dcfce7;">
                                        <div style="display: flex; flex-direction: column; gap: 0.15rem; text-align: left;">
                                            <span style="font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; font-weight: 700; display: block;">Temporary Password</span>
                                            <span id="displayPassword" style="font-weight: 700; color: var(--text-main); font-family: monospace; font-size: 0.95rem;">••••••••</span>
                                        </div>
                                        <div style="display: flex; gap: 0.5rem;">
                                            <button id="togglePassBtn" onclick="window.togglePasswordVisibility('${user.password}')" class="btn" style="padding: 0.4rem; background: #f1f5f9; border-radius: 6px; font-size: 0.8rem; min-width: 32px; height: 32px; border: none; cursor: pointer;" title="Show Password">
                                                <i class="far fa-eye"></i>
                                            </button>
                                            <button onclick="navigator.clipboard.writeText('${user.password}')" class="btn" style="padding: 0.4rem; background: #f1f5f9; border-radius: 6px; font-size: 0.8rem; min-width: 32px; height: 32px; border: none; cursor: pointer;" title="Copy Password">
                                                <i class="far fa-copy"></i>
                                            </button>
                                        </div>
                                    </div>
                                    <p style="font-size: 0.75rem; color: #b45309; margin-top: 0.5rem; font-weight: 600; text-align: left;">
                                        <i class="fas fa-exclamation-triangle"></i> This account uses temporary credentials. Sign in again to secure it.
                                    </p>
                                    ` : `
                                    <div style="background: white; padding: 1rem; border-radius: 10px; border: 1px solid var(--glass-border); text-align: left;">
                                        <span style="font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; font-weight: 700; display: block; margin-bottom: 0.5rem;">Password Security</span>
                                        <span style="font-weight: 700; color: var(--primary-light); font-size: 0.9rem; display: block; margin-bottom: 0.75rem;">
                                            <i class="fas fa-shield-halved"></i> Secured via Firebase Auth
                                        </span>
                                        <button id="sendResetBtn" onclick="window.triggerPasswordReset('${user.email}')" class="btn btn-secondary" style="width: 100%; font-size: 0.8rem; padding: 0.6rem; border-radius: 8px; font-weight: 700; justify-content: center; background: var(--secondary); color: var(--text-main); border: 1px solid var(--glass-border);">
                                            <i class="fas fa-paper-plane" style="margin-right: 0.4rem;"></i> Reset Password via Email
                                        </button>
                                        <div id="resetNotifyText" style="font-size: 0.75rem; color: var(--primary-light); font-weight: 600; margin-top: 0.5rem; display: none; text-align: center;"></div>
                                    </div>
                                    `}
                                </div>
                            </div>
                            ` : ''}
                            <div class="glass" style="padding: 2rem;">
                                <h3 style="margin-bottom: 1.5rem; font-size: 1.25rem; display: flex; justify-content: space-between; align-items: center;">
                                    Expertise Profile
                                    ${isOwner ? `<button onclick="window.openEditModal('group-skills')" style="background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 1rem; transition: color 0.2s;"><i class="fas fa-edit hover-edit"></i></button>` : ''}
                                </h3>
                                <div style="display: flex; flex-wrap: wrap; gap: 0.75rem;">
                                    ${skillsContent}
                                </div>
                            </div>

                            <div class="glass" style="padding: 2rem;">
                                <h3 style="margin-bottom: 1.5rem; font-size: 1.1rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; display: flex; justify-content: space-between; align-items: center;">
                                    Digital Footprint
                                    ${isOwner ? `<button onclick="window.openEditModal('group-digital')" style="background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 1rem; transition: color 0.2s;"><i class="fas fa-edit hover-edit"></i></button>` : ''}
                                </h3>
                                <div style="display: flex; flex-direction: column; gap: 1rem;">
                                    ${digitalContent}
                                </div>
                            </div>
                        </div>

                        <!-- Main: Contributions -->
                        <!-- Main: Tabbed panel for Contributions vs Study Notes -->
                        <div class="glass" style="padding: 2.5rem; display: flex; flex-direction: column; gap: 2rem;">
                            <!-- Tabs Navigation -->
                            <div style="display: flex; border-bottom: 2px solid #f1f5f9; gap: 1.5rem; padding-bottom: 0.75rem; align-items: center;">
                                <button id="tab-contributions-btn" onclick="window.switchTab('contributions')" class="btn" style="padding: 0.6rem 1.2rem; background: var(--primary); color: white; border-radius: 10px; font-size: 0.9rem; border: none; cursor: pointer; transition: all 0.2s;">
                                    <i class="fas fa-award"></i> Contributions
                                </button>
                                <button id="tab-notes-btn" onclick="window.switchTab('notes')" class="btn" style="padding: 0.6rem 1.2rem; background: #f1f5f9; color: var(--text-dim); border-radius: 10px; font-size: 0.9rem; border: none; cursor: pointer; transition: all 0.2s;">
                                    <i class="fas fa-book-open"></i> Study Notes & Resources
                                </button>
                            </div>

                            <!-- Contributions Pane -->
                            <div id="pane-contributions">
                                <h3 style="margin-bottom: 1.5rem; font-size: 1.25rem; display: flex; justify-content: space-between; align-items: center; text-align: left;">
                                    Approved Achievements
                                    ${isOwner ? `<button onclick="window.openEditModal('group-contributions')" style="background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 1rem; transition: color 0.2s;"><i class="fas fa-edit hover-edit"></i></button>` : ''}
                                </h3>
                                <div style="display: flex; flex-direction: column; gap: 1.25rem;">
                                    ${contributionsContent}
                                </div>
                            </div>

                            <!-- Study Notes Pane -->
                            <div id="pane-notes" style="display: none;">
                                <h3 style="margin-bottom: 1.5rem; font-size: 1.25rem; display: flex; justify-content: space-between; align-items: center; text-align: left;">
                                    Learning Repository
                                    ${isOwner ? `
                                        <button onclick="window.openUploadResourceModal()" class="btn btn-secondary" style="font-size: 0.8rem; padding: 0.4rem 1rem; border-radius: 8px; font-weight: 700;">
                                            <i class="fas fa-cloud-arrow-up"></i> Share Notes
                                        </button>
                                    ` : ''}
                                </h3>
                                <div style="display: flex; flex-direction: column; gap: 1.25rem;">
                                    ${studyNotesContent}
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Edit Modal -->
                    ${isOwner ? `
                    <div id="editModal" class="modal-overlay" style="display: none;">
                        <div class="modal-content" style="max-height: 92vh; overflow-y: auto; width: 100%; max-width: 600px;">
                            <div class="responsive-flex" style="margin-bottom: 2rem;">
                                <h2 style="margin: 0;">Edit Portfolio</h2>
                                <button onclick="window.closeEditModal()" style="background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 1.5rem;"><i class="fas fa-times"></i></button>
                            </div>

                            <form id="editForm">

                                <!-- Identity -->
                                <div style="background: #f8fafc; border-radius: 1rem; padding: 1.5rem; margin-bottom: 1.5rem; border: 1px solid #e2e8f0;">
                                    <h4 style="margin: 0 0 1.25rem; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-dim);">Identity</h4>
                                    <div style="display: flex; align-items: center; gap: 1.5rem; margin-bottom: 1.25rem;" id="group-avatar">
                                        <img id="avatarPreview" src="${user.avatar || 'https://api.dicebear.com/7.x/avataaars/svg?seed=' + encodeURIComponent(user.name)}" class="modal-avatar-preview" alt="Preview">
                                        <div style="flex: 1;">
                                            <label style="display: block; font-weight: 700; font-size: 0.85rem; margin-bottom: 0.4rem; color: var(--text-main);">Profile Picture URL (DP)</label>
                                            <input type="url" id="editAvatar" placeholder="https://..." value="${user.avatar || ''}"
                                                oninput="document.getElementById('avatarPreview').src = this.value || 'https://api.dicebear.com/7.x/avataaars/svg?seed=default'"
                                                style="width: 100%; box-sizing: border-box;">
                                            <p style="margin: 0.4rem 0 0; font-size: 0.75rem; color: var(--text-dim);">Tip: use <a href="https://dicebear.com/styles/avataaars/" target="_blank" style="color: var(--primary);">dicebear.com</a> for free avatars</p>
                                        </div>
                                    </div>
                                    <div class="form-group" id="group-name" style="margin-bottom: 0;">
                                        <label>Display Name</label>
                                        <input type="text" id="editName" placeholder="Your name" value="${user.name || ''}" required>
                                    </div>
                                </div>

                                <!-- Bio -->
                                <div class="form-group" id="group-bio">
                                    <label>Professional Bio</label>
                                    <textarea id="editBio" placeholder="Summarize your professional journey..." style="min-height: 90px;">${user.bio || ''}</textarea>
                                </div>

                                <!-- Skills -->
                                <div class="form-group" id="group-skills">
                                    <label>Core Skills <span style="font-weight: 400; color: var(--text-dim);">(separate with commas)</span></label>
                                    <input type="text" id="editSkills" placeholder="e.g. System Design, Agile, UI/UX" value="${user.skills || ''}">
                                </div>

                                <!-- Digital Footprint -->
                                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;" id="group-digital">
                                    <div class="form-group" style="margin-bottom: 0;">
                                        <label>GitHub URL</label>
                                        <input type="url" id="editGithub" placeholder="https://github.com/..." value="${user.github || ''}">
                                    </div>
                                    <div class="form-group" style="margin-bottom: 0;">
                                        <label>LinkedIn URL</label>
                                        <input type="url" id="editLinkedin" placeholder="https://linkedin.com/..." value="${user.linkedin || ''}">
                                    </div>
                                </div>

                                <!-- Custom Contributions -->
                                <div id="group-contributions" style="margin-top: 1.5rem; border-top: 1px solid #e2e8f0; padding-top: 1.5rem;">
                                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                                        <label style="margin: 0; font-weight: 700; color: var(--text-main);">Custom Contributions</label>
                                        <button type="button" onclick="window.addContributionField()" class="btn" style="background: var(--secondary); color: var(--text-main); border: 1px solid var(--glass-border); font-size: 0.8rem; padding: 0.4rem 0.9rem; border-radius: 8px; font-weight: 700;"><i class="fas fa-plus" style="margin-right: 0.3rem;"></i>Add</button>
                                    </div>
                                    <div id="customContributionsList" style="display: flex; flex-direction: column; gap: 0.75rem;"></div>
                                </div>

                                <button type="submit" class="btn btn-primary" style="width: 100%; height: 50px; margin-top: 1.5rem; font-size: 1rem;">
                                    <i class="fas fa-save" style="margin-right: 0.5rem;"></i> Save Changes
                                </button>
                            </form>
                        </div>
                    </div>
                    ` : ''}

                    <!-- Upload Resource Modal -->
                    ${isOwner ? `
                    <div id="uploadResourceModal" class="modal-overlay" style="display: none;">
                        <div class="modal-content" style="max-height: 92vh; overflow-y: auto; width: 100%; max-width: 550px; text-align: left;">
                            <div class="responsive-flex" style="margin-bottom: 2rem;">
                                <h2 style="margin: 0;"><i class="fas fa-file-export" style="color: var(--primary); margin-right: 0.5rem;"></i>Share Study Material</h2>
                                <button onclick="window.closeUploadResourceModal()" style="background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 1.5rem;"><i class="fas fa-times"></i></button>
                            </div>

                            <form id="uploadResourceForm">
                                <div class="form-group">
                                    <label for="resourceTitle">Topic / Title *</label>
                                    <input type="text" id="resourceTitle" required placeholder="e.g. Introduction to Neural Networks">
                                </div>
                                <div class="form-group">
                                    <label for="resourceLink">Material URL (PDF, GitHub, Drive Link) *</label>
                                    <input type="url" id="resourceLink" required placeholder="https://example.com/notes">
                                </div>
                                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                                    <div class="form-group">
                                        <label for="resourceSubject">Subject Name *</label>
                                        <input type="text" id="resourceSubject" required placeholder="e.g. Deep Learning">
                                    </div>
                                    <div class="form-group">
                                        <label for="resourceSubjectCode">Subject Code *</label>
                                        <input type="text" id="resourceSubjectCode" required placeholder="e.g. CS412" style="text-transform: uppercase;">
                                    </div>
                                </div>
                                
                                <div class="form-group">
                                    <label for="resourceCategory">Category *</label>
                                    <select id="resourceCategory" onchange="window.handleCategorySelect(this.value)">
                                        <option value="Tech" selected>Technology & CS</option>
                                        <option value="Science">Sciences</option>
                                        <option value="Math">Mathematics</option>
                                        <option value="Business">Business & Management</option>
                                        <option value="Arts">Humanities & Arts</option>
                                        <option value="Custom">+ Create Custom Category</option>
                                    </select>
                                </div>

                                <div class="form-group" id="customCategoryGroup" style="display: none;">
                                    <label for="resourceCustomCategory">Custom Category Name *</label>
                                    <input type="text" id="resourceCustomCategory" placeholder="e.g. Engineering">
                                </div>

                                <button type="submit" class="btn btn-secondary" style="width: 100%; height: 50px; margin-top: 1.5rem; font-size: 1rem;">
                                    <i class="fas fa-cloud-arrow-up" style="margin-right: 0.5rem;"></i> Publish Study Note
                                </button>
                            </form>
                        </div>
                    </div>
                    ` : ''}
                `;

                if (!isOwner) return;

                // --- Custom Contributions ---
                let customConts = user.customContributions ? [...user.customContributions] : [];

                const renderCustomContributionsInputs = () => {
                    const listContainer = document.getElementById('customContributionsList');
                    if (!listContainer) return;
                    listContainer.innerHTML = '';
                    if (customConts.length === 0) {
                        listContainer.innerHTML = `<p style="font-size: 0.85rem; color: var(--text-dim); text-align: center; padding: 0.5rem 0;">No custom contributions yet. Click Add to create one.</p>`;
                        return;
                    }
                    customConts.forEach((c, index) => {
                        const div = document.createElement('div');
                        div.style.cssText = "background: #f8fafc; padding: 1rem; border-radius: 8px; border: 1px solid #e2e8f0; display: flex; flex-direction: column; gap: 0.6rem;";
                        div.innerHTML = `
                            <div style="display: flex; justify-content: space-between; align-items: center;">
                                <span style="font-weight: 600; font-size: 0.8rem; color: var(--text-dim);">Contribution #${index + 1}</span>
                                <button type="button" onclick="window.removeContribution(${index})" style="background: none; border: none; color: #ef4444; cursor: pointer; padding: 0;"><i class="fas fa-trash-alt"></i></button>
                            </div>
                            <input type="text" placeholder="Project / Contribution Title *" value="${c.title || ''}" oninput="window.updateContribution(${index}, 'title', this.value)" style="padding: 0.5rem 0.75rem; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 0.9rem; width: 100%; box-sizing: border-box;">
                            <input type="url" placeholder="Link (optional)" value="${c.link || ''}" oninput="window.updateContribution(${index}, 'link', this.value)" style="padding: 0.5rem 0.75rem; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 0.9rem; width: 100%; box-sizing: border-box;">
                        `;
                        listContainer.appendChild(div);
                    });
                };

                window.addContributionField = () => {
                    customConts.push({ title: '', link: '', date: new Date().toISOString() });
                    renderCustomContributionsInputs();
                };

                window.removeContribution = (index) => {
                    customConts.splice(index, 1);
                    renderCustomContributionsInputs();
                };

                window.updateContribution = (index, field, value) => {
                    if (customConts[index]) customConts[index][field] = value;
                };

                // --- Modal Logic ---
                window.openEditModal = (targetId = null) => {
                    document.getElementById('editModal').style.display = 'flex';
                    renderCustomContributionsInputs();
                    if (targetId) {
                        setTimeout(() => {
                            const el = document.getElementById(targetId);
                            if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        }, 120);
                    }
                };

                window.closeEditModal = () => {
                    document.getElementById('editModal').style.display = 'none';
                };

                // --- Save Handler ---
                document.getElementById('editForm').addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const submitBtn = e.target.querySelector('button[type="submit"]');
                    submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';
                    submitBtn.disabled = true;

                    const validContributions = customConts.filter(c => c.title && c.title.trim() !== '');

                    const updatedData = {
                        name: document.getElementById('editName').value,
                        avatar: document.getElementById('editAvatar').value,
                        bio: document.getElementById('editBio').value,
                        skills: document.getElementById('editSkills').value,
                        github: document.getElementById('editGithub').value,
                        linkedin: document.getElementById('editLinkedin').value,
                        customContributions: validContributions
                    };

                    await updateUser(user.id, updatedData);
                    window.closeEditModal();
                    renderProfile();
                });

                // --- Password Visibility Toggle ---
                window.togglePasswordVisibility = (passVal) => {
                    const passEl = document.getElementById('displayPassword');
                    const btnIcon = document.getElementById('togglePassBtn').querySelector('i');
                    if (passEl.innerText === '••••••••') {
                        passEl.innerText = passVal;
                        btnIcon.className = 'far fa-eye-slash';
                    } else {
                        passEl.innerText = '••••••••';
                        btnIcon.className = 'far fa-eye';
                    }
                };

                // --- Secure Password Reset Email ---
                window.triggerPasswordReset = async (email) => {
                    const btn = document.getElementById('sendResetBtn');
                    const notify = document.getElementById('resetNotifyText');
                    try {
                        btn.disabled = true;
                        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending...';
                        await sendPasswordReset(email);
                        notify.style.display = 'block';
                        notify.innerText = "Reset email sent successfully!";
                        notify.style.color = '#047857';
                    } catch (err) {
                        console.error(err);
                        notify.style.display = 'block';
                        notify.innerText = "Error: " + (err.message || "Failed to send reset link.");
                        notify.style.color = '#ef4444';
                    } finally {
                        btn.disabled = false;
                        btn.innerHTML = '<i class="fas fa-paper-plane" style="margin-right: 0.4rem;"></i> Reset Password via Email';
                    }
                };

                // --- Tab Swapping ---
                window.switchTab = (tabName) => {
                    const contBtn = document.getElementById('tab-contributions-btn');
                    const notesBtn = document.getElementById('tab-notes-btn');
                    const contPane = document.getElementById('pane-contributions');
                    const notesPane = document.getElementById('pane-notes');

                    if (tabName === 'contributions') {
                        contBtn.style.background = 'var(--primary)';
                        contBtn.style.color = 'white';
                        notesBtn.style.background = '#f1f5f9';
                        notesBtn.style.color = 'var(--text-dim)';
                        contPane.style.display = 'block';
                        notesPane.style.display = 'none';
                    } else {
                        notesBtn.style.background = 'var(--primary)';
                        notesBtn.style.color = 'white';
                        contBtn.style.background = '#f1f5f9';
                        contBtn.style.color = 'var(--text-dim)';
                        contPane.style.display = 'none';
                        notesPane.style.display = 'block';
                    }
                };

                // --- Study Note Modal Handlers ---
                window.openUploadResourceModal = () => {
                    document.getElementById('uploadResourceModal').style.display = 'flex';
                };

                window.closeUploadResourceModal = () => {
                    document.getElementById('uploadResourceModal').style.display = 'none';
                    document.getElementById('uploadResourceForm').reset();
                    document.getElementById('customCategoryGroup').style.display = 'none';
                };

                window.handleCategorySelect = (val) => {
                    const customGroup = document.getElementById('customCategoryGroup');
                    if (val === 'Custom') {
                        customGroup.style.display = 'block';
                        document.getElementById('resourceCustomCategory').required = true;
                    } else {
                        customGroup.style.display = 'none';
                        document.getElementById('resourceCustomCategory').required = false;
                    }
                };

                // --- Delete Study Note ---
                window.deleteStudyNote = async (index) => {
                    const confirmDel = confirm("Are you sure you want to delete this study note?");
                    if (!confirmDel) return;

                    try {
                        const currentNotes = [...(user.studyNotes || [])];
                        currentNotes.splice(index, 1);
                        await updateUser(user.id, { studyNotes: currentNotes });
                        renderProfile();
                        setTimeout(() => {
                            window.switchTab('notes');
                        }, 100);
                    } catch (err) {
                        console.error("Error deleting note:", err);
                    }
                };

                // --- Upload Notes Form Submit ---
                if (isOwner) {
                    document.getElementById('uploadResourceForm').addEventListener('submit', async (e) => {
                        e.preventDefault();
                        const submitBtn = e.target.querySelector('button[type="submit"]');
                        submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Publishing...';
                        submitBtn.disabled = true;

                        try {
                            const categorySelect = document.getElementById('resourceCategory').value;
                            let category = categorySelect;
                            if (categorySelect === 'Custom') {
                                category = document.getElementById('resourceCustomCategory').value.trim();
                            }

                            const newNote = {
                                title: document.getElementById('resourceTitle').value.trim(),
                                link: document.getElementById('resourceLink').value.trim(),
                                subject: document.getElementById('resourceSubject').value.trim(),
                                subjectCode: document.getElementById('resourceSubjectCode').value.trim().toUpperCase(),
                                category: category,
                                date: new Date().toISOString()
                            };

                            const currentNotes = [...(user.studyNotes || [])];
                            currentNotes.push(newNote);

                            await updateUser(user.id, { studyNotes: currentNotes });
                            window.closeUploadResourceModal();
                            renderProfile();
                            setTimeout(() => {
                                window.switchTab('notes');
                            }, 100);

                        } catch (err) {
                            console.error("Error saving note:", err);
                            alert("Failed to save study notes: " + err.message);
                            submitBtn.innerHTML = '<i class="fas fa-cloud-arrow-up"></i> Publish Study Note';
                            submitBtn.disabled = false;
                        }
                    });
                }

            } catch (err) {
                console.error("Error rendering profile:", err);
            }
        }

        renderProfile();
    </script>
</body>

</html>
