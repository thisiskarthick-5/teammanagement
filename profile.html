<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | TEAMSYNC</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .profile-card {
            background: white;
            border-radius: var(--radius-lg);
            border: 1px solid #e2e8f0;
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }

        .profile-header-banner {
            height: 120px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            position: relative;
        }

        .avatar-large {
            width: 140px;
            height: 140px;
            border-radius: 32px;
            border: 6px solid white;
            position: absolute;
            bottom: -70px;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: var(--shadow-lg);
            background: white;
        }

        .skill-tag {
            padding: 0.5rem 1.25rem;
            background: #f1f5f9;
            color: #475569;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            border: 1px solid #e2e8f0;
            transition: all 0.2s;
        }

        .skill-tag:hover {
            background: white;
            border-color: var(--primary);
            color: var(--primary);
            transform: translateY(-2px);
        }

        .achievement-card {
            padding: 1.5rem;
            background: #f8fafc;
            border-radius: 1.25rem;
            border: 1px solid #e2e8f0;
            transition: all 0.2s;
        }

        .achievement-card:hover {
            background: white;
            border-color: var(--primary);
            box-shadow: var(--shadow-md);
        }
    </style>
</head>

<body>
    <main class="main-content">
        <div id="profileContainer">
            <!-- Loaded dynamically -->
        </div>
    </main>

    <script type="module">
        import { getUser, getTasks, getAttendance, getCurrentUser, updateUser } from './js/data.js';
        import { initSidebar } from './js/sidebar.js';

        document.addEventListener('DOMContentLoaded', initSidebar);

        const urlParams = new URLSearchParams(window.location.search);
        const profileId = urlParams.get('id');
        const currentUser = getCurrentUser();

        async function renderProfile() {
            try {
                const user = await getUser(profileId);
                const container = document.getElementById('profileContainer');

                if (!user) {
                    container.innerHTML = `<div class="glass" style="padding: 4rem; text-align: center;">Member not found.</div>`;
                    return;
                }

                const allTasks = await getTasks();
                const tasks = allTasks.filter(t => t.assignedTo === user.id && t.status === 'Approved');
                const attendance = await getAttendance(user.id);

                const isOwner = currentUser && currentUser.id === user.id;

                container.innerHTML = `
                    <div class="profile-card animate-in" style="margin-bottom: 2rem;">
                        <div class="profile-header-banner">
                            ${isOwner ? `
                                <button onclick="window.openEditModal()" class="btn btn-primary" style="position: absolute; top: 1.5rem; right: 1.5rem; padding: 0.75rem 1.5rem; color: #064e3b;">
                                    <i class="fas fa-pen-nib"></i> Edit Portfolio
                                </button>
                            ` : ''}
                            <img src="${user.avatar}" class="avatar-large">
                        </div>
                        
                        <div style="padding: 5rem 2.5rem 2.5rem; text-align: center;">
                            <h1 style="font-size: 2.25rem; margin-bottom: 0.25rem;">${user.name}</h1>
                            <div style="display: flex; justify-content: center; align-items: center; gap: 0.75rem; margin-bottom: 1.5rem;">
                                <span style="background: #f1f5f9; color: #475569; padding: 0.4rem 1rem; border-radius: 100px; font-weight: 700; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em;">${user.id}</span>
                                <span style="background: #ecfdf5; color: #059669; padding: 0.4rem 1rem; border-radius: 100px; font-weight: 700; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em;">${user.role}</span>
                            </div>
                            
                            ${user.bio ? `<p style="max-width: 650px; margin: 0 auto 2rem; color: var(--text-dim); line-height: 1.6; font-size: 1.05rem;">${user.bio}</p>` : ''}
                            
                            <div style="display: flex; justify-content: center; gap: 3rem; border-top: 1px solid #f1f5f9; padding-top: 2rem;">
                                <div>
                                    <div style="font-size: 2rem; font-weight: 800; color: var(--primary);">${user.streak || 0}</div>
                                    <div style="font-weight: 700; color: var(--text-dim); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em;">Day Streak</div>
                                </div>
                                <div>
                                    <div style="font-size: 2rem; font-weight: 800; color: var(--primary);">${tasks.length}</div>
                                    <div style="font-weight: 700; color: var(--text-dim); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em;">Milestones</div>
                                </div>
                                <div>
                                    <div style="font-size: 2rem; font-weight: 800; color: var(--primary);">${attendance.length}</div>
                                    <div style="font-weight: 700; color: var(--text-dim); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em;">Engagements</div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1.8fr; gap: 2rem;">
                        <div class="glass" style="padding: 2rem; height: fit-content;">
                            <h3 style="margin-bottom: 1.5rem; font-size: 1.25rem;">Expertise Profile</h3>
                            <div id="skillsList" style="display: flex; flex-wrap: wrap; gap: 0.75rem;">
                                ${user.skills ? user.skills.split(',').map(s => `
                                    <span class="skill-tag">
                                        <i class="fas fa-check-circle" style="color: var(--primary); font-size: 0.8rem;"></i>
                                        ${s.trim()}
                                    </span>
                                `).join('') : `
                                    <span class="skill-tag">Design Thinking</span>
                                    <span class="skill-tag">Technical Vision</span>
                                    <span class="skill-tag">Productivity Ops</span>
                                `}
                            </div>
                            
                            <h3 style="margin-top: 3rem; margin-bottom: 1.5rem; font-size: 1.1rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em;">Digital Footprint</h3>
                            <div style="display: flex; flex-direction: column; gap: 1rem;">
                                <a href="${user.github || '#'}" class="btn" style="background: #f1f5f9; justify-content: flex-start; gap: 1rem; padding: 1rem 1.25rem; font-weight: 700; border-radius: 14px;">
                                    <i class="fab fa-github" style="font-size: 1.25rem;"></i> GitHub Repository
                                </a>
                                <a href="${user.linkedin || '#'}" class="btn" style="background: #f1f5f9; justify-content: flex-start; gap: 1rem; padding: 1rem 1.25rem; font-weight: 700; border-radius: 14px;">
                                    <i class="fab fa-linkedin" style="font-size: 1.25rem; color: #0077b5;"></i> Professional Network
                                </a>
                                <a href="mailto:${user.email}" class="btn" style="background: #f1f5f9; justify-content: flex-start; gap: 1rem; padding: 1rem 1.25rem; font-weight: 700; border-radius: 14px;">
                                    <i class="fas fa-envelope" style="font-size: 1.25rem; color: #ea4335;"></i> Active Email
                                </a>
                            </div>
                        </div>

                        <div class="glass" style="padding: 2rem;">
                            <h3 style="margin-bottom: 2rem; font-size: 1.25rem;">Approved Contributions</h3>
                            <div style="display: flex; flex-direction: column; gap: 1.25rem;">
                                ${tasks.length === 0 ? `
                                    <div style="text-align: center; padding: 4rem 2rem; background: #f8fafc; border-radius: 1.5rem; border: 2px dashed #e2e8f0;">
                                        <i class="fas fa-scroll" style="font-size: 2.5rem; color: #cbd5e1; margin-bottom: 1rem;"></i>
                                        <p style="margin: 0; font-weight: 600; color: var(--text-dim);">No approved artifacts detected in this lifecycle.</p>
                                    </div>
                                ` : tasks.map(t => `
                                    <div class="achievement-card">
                                        <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 0.75rem;">
                                            <h4 style="margin: 0; font-size: 1.1rem; color: var(--text-main);">${t.title}</h4>
                                            <span style="font-size: 0.7rem; font-weight: 800; color: var(--primary); background: #ecfdf5; padding: 0.35rem 0.75rem; border-radius: 100px; text-transform: uppercase;">VERIFIED</span>
                                        </div>
                                        <div style="display: flex; justify-content: space-between; align-items: center;">
                                            <span style="font-size: 0.85rem; color: var(--text-dim); font-weight: 600;">Finalized on ${new Date(t.createdAt).toLocaleDateString()}</span>
                                            <a href="${t.submission.link}" target="_blank" style="color: var(--primary); font-weight: 800; font-size: 0.85rem; text-decoration: none; display: flex; align-items: center; gap: 0.5rem;">
                                                Source Artifact <i class="fas fa-arrow-right" style="font-size: 0.7rem;"></i>
                                            </a>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>

                    <!-- Edit Modal -->
                    <div id="editModal" class="modal-overlay" style="display: none;">
                        <div class="modal-content">
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2.5rem;">
                                <h2 style="margin: 0;">Refine Portfolio</h2>
                                <button onclick="window.closeEditModal()" style="background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 1.5rem;"><i class="fas fa-times"></i></button>
                            </div>
                            <form id="editForm">
                                <div class="form-group">
                                    <label>Professional Bio</label>
                                    <textarea id="editBio" placeholder="Summarize your professional journey..." style="min-height: 100px;"></textarea>
                                </div>
                                <div class="form-group">
                                    <label>Core Skills (Separate with commas)</label>
                                    <input type="text" id="editSkills" placeholder="e.g. System Design, Agile, UI/UX">
                                </div>
                                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                                    <div class="form-group">
                                        <label>GitHub URL</label>
                                        <input type="url" id="editGithub" placeholder="https://github.com/...">
                                    </div>
                                    <div class="form-group">
                                        <label>LinkedIn URL</label>
                                        <input type="url" id="editLinkedin" placeholder="https://linkedin.com/...">
                                    </div>
                                </div>
                                <button type="submit" class="btn btn-primary" style="width: 100%; height: 50px; margin-top: 1rem;">Update Identity</button>
                            </form>
                        </div>
                    </div>
                `;

                // Handle Modal logic
                window.openEditModal = () => { document.getElementById('editModal').style.display = 'flex'; };
                window.closeEditModal = () => { document.getElementById('editModal').style.display = 'none'; };

                document.getElementById('editForm').addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const updatedData = {
                        bio: document.getElementById('editBio').value,
                        skills: document.getElementById('editSkills').value,
                        github: document.getElementById('editGithub').value,
                        linkedin: document.getElementById('editLinkedin').value
                    };
                    await updateUser(user.id, updatedData);
                    window.closeEditModal();
                    renderProfile();
                });

            } catch (err) {
                console.error("Error rendering profile:", err);
            }
        }

        renderProfile();
    </script>
</body>

</html>
