<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Chat | TEAMSYNC</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Load the Jitsi Meet External Iframe API -->
    <script src="https://meet.jit.si/external_api.js"></script>

    <style>
        /* Extra styles specifically for emoji picker popup */
        .emoji-picker-btn {
            background: none;
            border: none;
            color: var(--text-dim);
            font-size: 1.35rem;
            cursor: pointer;
            padding: 0.5rem;
            transition: color 0.2s, transform 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .emoji-picker-btn:hover {
            color: var(--primary);
            transform: scale(1.1);
        }

        .emoji-popover {
            position: absolute;
            bottom: 80px;
            left: 20px;
            background: white;
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow-lg);
            border-radius: 12px;
            padding: 0.75rem;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 0.5rem;
            z-index: 100;
            animation: fadeIn 0.2s ease-out;
        }

        .emoji-item {
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0.25rem;
            text-align: center;
            transition: transform 0.1s;
        }

        .emoji-item:hover {
            transform: scale(1.2);
        }
    </style>
</head>

<body>
    <!-- Guard screen if not in team -->
    <div id="noTeamGuard" class="team-guard-overlay" style="display: none;">
        <div class="team-guard-card">
            <i class="fas fa-comments"></i>
            <h2>Team Chat Restricted</h2>
            <p class="text-dim">To start chatting with your colleagues in real-time, you must first belong to a team workspace. Create or join one now!</p>
            <button class="btn btn-secondary" onclick="window.location.href='teams.html'" style="height: 50px; border-radius: 12px; width: 100%;">
                <i class="fas fa-users-gear"></i> Set Up My Team
            </button>
        </div>
    </div>

    <!-- Main Chat Workspace -->
    <main class="main-content">
        <div class="chat-container">
            <!-- Sidebar Panel: List of members -->
            <div class="chat-sidebar">
                <div class="chat-sidebar-header">
                    <h3 id="sidebarTeamName" style="margin-bottom: 0.25rem; font-weight: 800;">My Team</h3>
                    <span class="text-dim" style="font-size: 0.8rem; font-weight: 600;">Linked Cohort</span>
                </div>
                <div class="chat-member-list" id="chatMemberList">
                    <!-- Members injected here -->
                </div>
            </div>

            <!-- Main Chat Area -->
            <div class="chat-main">
                <!-- Chat Header -->
                <div class="chat-header">
                    <div style="display: flex; align-items: center; gap: 0.75rem;">
                        <div style="width: 42px; height: 42px; background: #ecfdf5; color: var(--primary); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem;">
                            <i class="fas fa-comments"></i>
                        </div>
                        <div>
                            <h3 style="margin: 0; font-size: 1.15rem; font-weight: 800;" id="chatHeaderTitle">Team Channel</h3>
                            <span class="text-dim" style="font-size: 0.75rem; font-weight: 600;" id="chatHeaderSub">Real-time collaboration channel</span>
                        </div>
                    </div>
                    
                    <div style="display: flex; align-items: center;">
                        <!-- Video Call Trigger Button -->
                        <button class="chat-call-btn" id="startCallBtn" title="Start Private Video Call">
                            <i class="fas fa-video"></i>
                        </button>
                        
                        <span class="text-dim" style="font-size: 0.8rem; font-weight: 700; background: var(--bg-main); padding: 0.4rem 0.8rem; border-radius: 8px; border: 1px solid var(--glass-border);" id="chatTeamCodeBadge">
                            CODE: XXXXXX
                        </span>
                    </div>
                </div>

                <!-- Messages Display -->
                <div class="chat-messages" id="chatMessagesArea">
                    <div class="text-dim" style="text-align: center; margin: auto; font-weight: 600;">Loading chat stream...</div>
                </div>

                <!-- Composer Input -->
                <div class="chat-input-container">
                    <button class="emoji-picker-btn" id="emojiToggle" title="Add Emoji">
                        <i class="far fa-smile"></i>
                    </button>
                    <!-- Popover emoji list -->
                    <div class="emoji-popover" id="emojiPopover" style="display: none;">
                        <span class="emoji-item">😀</span>
                        <span class="emoji-item">😂</span>
                        <span class="emoji-item">😍</span>
                        <span class="emoji-item">👍</span>
                        <span class="emoji-item">🔥</span>
                        <span class="emoji-item">🎉</span>
                        <span class="emoji-item">🚀</span>
                        <span class="emoji-item">💻</span>
                        <span class="emoji-item">👏</span>
                        <span class="emoji-item">💯</span>
                    </div>

                    <form id="chatForm" class="chat-input-form">
                        <input type="text" id="chatInputText" class="chat-input" placeholder="Type a message..." required autocomplete="off">
                        <button type="submit" class="chat-send-btn" title="Send message">
                            <i class="fas fa-paper-plane"></i>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <!-- Video Call Overlay Modal -->
    <div class="video-call-modal" id="videoCallModal">
        <div class="video-call-content" id="videoCallContent">
            <div class="video-call-header">
                <div style="display: flex; align-items: center; gap: 0.75rem;">
                    <div style="width: 8px; height: 8px; background: #ef4444; border-radius: 50%; position: relative;">
                        <div class="meeting-invite-pulse" style="border-radius: 50%; background: #ef4444;"></div>
                    </div>
                    <span style="font-weight: 800; font-size: 0.95rem; color: var(--text-main);" id="videoCallTitle">Private Team Video Call</span>
                </div>
                <div style="display: flex; align-items: center; gap: 0.75rem;">
                    <button class="btn" id="minimizeCallBtn" style="padding: 0.4rem 0.6rem; background: #e2e8f0; color: #475569; border-radius: 6px; font-size: 0.8rem; border: none; font-weight: 700; cursor: pointer;" title="Minimize Call (PiP)">
                        <i class="fas fa-minus"></i>
                    </button>
                    <button class="btn" id="endCallBtn" style="padding: 0.4rem 0.8rem; background: #fee2e2; color: #ef4444; border-radius: 6px; font-size: 0.8rem; border: none; font-weight: 800; cursor: pointer;" title="Leave Video Call">
                        <i class="fas fa-phone-slash"></i> End Call
                    </button>
                </div>
            </div>
            <div class="video-call-body" id="meetIframeContainer">
                <!-- Jitsi Frame will inject here -->
            </div>
        </div>
    </div>

    <script type="module">
        import { sendChatMessage, subscribeToChatMessages, getTeamDetails, getTeamMembers, getCurrentUser } from './js/data.js';
        import { initSidebar } from './js/sidebar.js';

        document.addEventListener('DOMContentLoaded', initSidebar);

        const currentUser = getCurrentUser();
        let jitsiAPI = null;

        async function initChat() {
            if (!currentUser) return;

            if (!currentUser.teamId) {
                document.getElementById('noTeamGuard').style.display = 'flex';
                return;
            }

            try {
                // Fetch team meta
                const team = await getTeamDetails(currentUser.teamId);
                if (team) {
                    document.getElementById('sidebarTeamName').innerText = team.name;
                    document.getElementById('chatHeaderTitle').innerText = team.name;
                    document.getElementById('chatTeamCodeBadge').innerText = `INVITE CODE: ${team.code}`;
                }

                // Fetch members
                const members = await getTeamMembers(currentUser.teamId);
                const memberListContainer = document.getElementById('chatMemberList');
                
                memberListContainer.innerHTML = members.map(m => `
                    <div class="chat-member-item">
                        <img src="${m.avatar}" style="width: 38px; height: 38px; border-radius: 50%; box-shadow: var(--shadow-sm);">
                        <div style="flex: 1; overflow: hidden;">
                            <div style="font-weight: 700; color: var(--text-main); font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${m.name}</div>
                            <div style="font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; font-weight: 700;">${m.role}</div>
                        </div>
                        <div style="width: 8px; height: 8px; background: #10b981; border-radius: 50%;" title="Online"></div>
                    </div>
                `).join('');

                document.getElementById('chatHeaderSub').innerText = `${members.length} member${members.length === 1 ? '' : 's'} connected`;

                // Subscribe to real-time chat messages
                const messagesArea = document.getElementById('chatMessagesArea');

                subscribeToChatMessages(currentUser.teamId, (messages) => {
                    if (messages.length === 0) {
                        messagesArea.innerHTML = `<div class="text-dim" style="text-align: center; margin: auto; font-weight: 600; font-size: 0.9rem;"><i class="far fa-message"></i> No messages yet. Start the conversation!</div>`;
                        return;
                    }

                    messagesArea.innerHTML = messages.map(msg => {
                        const isMe = msg.senderId === currentUser.id;
                        const bubbleClass = isMe ? 'sent' : 'received';
                        const time = msg.createdAt ? new Date(msg.createdAt).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '';
                        
                        // Check for meeting invitation cards
                        if (msg.text && msg.text.startsWith('[MEETING_ACTIVE]')) {
                            const inviteDesc = msg.text.replace('[MEETING_ACTIVE]', '').trim();
                            return `
                                <div class="message-bubble ${bubbleClass}" style="background: transparent; box-shadow: none; padding: 0; align-self: ${isMe ? 'flex-end' : 'flex-start'};">
                                    <div class="meeting-invite-card">
                                        <div class="meeting-invite-header">
                                            <div class="meeting-invite-icon">
                                                <div class="meeting-invite-pulse"></div>
                                                <i class="fas fa-video"></i>
                                            </div>
                                            <div>
                                                <div style="font-weight: 800; font-size: 0.9rem; color: var(--text-main);">Video Call Started</div>
                                                <div style="font-size: 0.75rem; color: var(--text-dim);">${msg.senderName} initiated a meeting</div>
                                            </div>
                                        </div>
                                        <div style="font-size: 0.8rem; color: var(--text-dim); line-height: 1.4;">${inviteDesc}</div>
                                        <button class="meeting-invite-btn" onclick="window.joinTeamVideoCall()">
                                            <i class="fas fa-phone"></i> Join Call
                                        </button>
                                    </div>
                                </div>
                            `;
                        }

                        return `
                            <div class="message-bubble ${bubbleClass}">
                                ${!isMe ? `<span class="message-sender">${msg.senderName}</span>` : ''}
                                <span class="message-text">${msg.text}</span>
                                <span class="message-time">${time}</span>
                            </div>
                        `;
                    }).join('');

                    // Scroll to bottom
                    messagesArea.scrollTop = messagesArea.scrollHeight;
                });

            } catch (err) {
                console.error("Error initializing chat workspace:", err);
            }
        }

        // --- Video Call Handlers ---
        async function startVideoCall(sendInvite = false) {
            const modal = document.getElementById('videoCallModal');
            const container = document.getElementById('meetIframeContainer');
            
            // If already active, restore view
            if (jitsiAPI) {
                modal.style.display = 'flex';
                document.getElementById('videoCallContent').classList.remove('minimized');
                return;
            }
            
            modal.style.display = 'flex';
            container.innerHTML = ''; // Clear container
            
            const domain = 'meet.jit.si';
            const options = {
                roomName: `teamsync_meet_${currentUser.teamId}`,
                width: '100%',
                height: '100%',
                parentNode: container,
                userInfo: {
                    displayName: currentUser.name
                },
                configOverwrite: {
                    startWithAudioMuted: false,
                    startWithVideoMuted: false,
                    prejoinPageEnabled: false
                },
                interfaceConfigOverwrite: {
                    TILE_VIEW_MAX_COLUMNS: 3
                }
            };
            
            // Instantiate external iframe API
            jitsiAPI = new JitsiMeetExternalAPI(domain, options);
            
            // Handle Jitsi closing events
            jitsiAPI.addEventListener('readyToClose', () => {
                endVideoCall();
            });
            
            // Send call invitation card in real-time
            if (sendInvite) {
                try {
                    await sendChatMessage(currentUser.teamId, `[MEETING_ACTIVE] Team video call initiated. Join room to coordinate in real-time.`);
                } catch (err) {
                    console.error("Could not broadcast meeting invitation card:", err);
                }
            }
        }

        function endVideoCall() {
            if (jitsiAPI) {
                jitsiAPI.dispose();
                jitsiAPI = null;
            }
            document.getElementById('videoCallModal').style.display = 'none';
            document.getElementById('videoCallContent').classList.remove('minimized');
            document.getElementById('meetIframeContainer').innerHTML = '';
        }

        // Expose to window so onclick handlers on message cards can execute it
        window.joinTeamVideoCall = () => {
            startVideoCall(false);
        };

        // Header start button
        document.getElementById('startCallBtn').addEventListener('click', () => {
            startVideoCall(true);
        });

        // Close Call
        document.getElementById('endCallBtn').addEventListener('click', () => {
            endVideoCall();
        });

        // Minimize Call (PiP)
        const minimizeBtn = document.getElementById('minimizeCallBtn');
        const modalContent = document.getElementById('videoCallContent');
        
        minimizeBtn.addEventListener('click', () => {
            const isMin = modalContent.classList.toggle('minimized');
            const modal = document.getElementById('videoCallModal');
            
            if (isMin) {
                modal.style.background = 'none';
                modal.style.backdropFilter = 'none';
                modal.style.pointerEvents = 'none';
                modalContent.style.pointerEvents = 'auto'; // enable interaction in pip mode
                minimizeBtn.innerHTML = '<i class="fas fa-expand"></i>';
                minimizeBtn.title = "Maximize Call";
            } else {
                modal.style.background = 'rgba(15, 23, 42, 0.45)';
                modal.style.backdropFilter = 'blur(8px)';
                modal.style.pointerEvents = 'auto';
                minimizeBtn.innerHTML = '<i class="fas fa-minus"></i>';
                minimizeBtn.title = "Minimize Call (PiP)";
            }
        });

        // --- Message Send ---
        document.getElementById('chatForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const input = document.getElementById('chatInputText');
            const text = input.value.trim();
            if (!text) return;

            try {
                input.value = '';
                await sendChatMessage(currentUser.teamId, text);
            } catch (err) {
                console.error("Failed to send message:", err);
                alert("Error sending message. Please try again.");
            }
        });

        // --- Emoji Picker ---
        const emojiToggle = document.getElementById('emojiToggle');
        const emojiPopover = document.getElementById('emojiPopover');

        emojiToggle.addEventListener('click', (e) => {
            e.stopPropagation();
            const visible = emojiPopover.style.display === 'grid';
            emojiPopover.style.display = visible ? 'none' : 'grid';
        });

        document.addEventListener('click', () => {
            emojiPopover.style.display = 'none';
        });

        emojiPopover.addEventListener('click', (e) => {
            e.stopPropagation();
            if (e.target.classList.contains('emoji-item')) {
                const emoji = e.target.innerText;
                const input = document.getElementById('chatInputText');
                input.value += emoji;
                emojiPopover.style.display = 'none';
                input.focus();
            }
        });

        initChat();
    </script>
</body>

</html>
